# Phase 5: LongMemEval-S
data_path: data/raw/longmemeval_s.json
embedder: intfloat/e5-base-v2
extract_model: gpt-4o-mini
judge_model: gpt-4o-mini
limit: null                     # set small for smoke runs
llm_cache: cache/llm_cache.sqlite
